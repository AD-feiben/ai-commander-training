<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="humanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad2)"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e40af" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="#f8fafc" font-size="28" font-family="system-ui" font-weight="bold">AI 能力边界</text>
  <text x="400" y="90" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui">了解 AI 能做什么，不能做什么</text>
  
  <!-- Balance Scale -->
  <g transform="translate(400, 350)">
    <!-- Stand -->
    <rect x="-10" y="100" width="20" height="80" fill="#475569" rx="2"/>
    <ellipse cx="0" cy="180" rx="60" ry="15" fill="#334155"/>
    
    <!-- Center pivot -->
    <circle cx="0" cy="0" r="15" fill="#f59e0b" filter="url(#glow2)"/>
    <circle cx="0" cy="0" r="8" fill="#fbbf24"/>
    
    <!-- Beam -->
    <rect x="-250" y="-5" width="500" height="10" fill="#64748b" rx="5"/>
    
    <!-- Left pan - AI Capabilities -->
    <g transform="translate(-200, 50)">
      <!-- Chain -->
      <line x1="0" y1="-55" x2="0" y2="0" stroke="#94a3b8" stroke-width="3"/>
      <!-- Pan -->
      <path d="M-60 0 Q-60 40 0 40 Q60 40 60 0" fill="none" stroke="url(#aiGrad)" stroke-width="3"/>
      <ellipse cx="0" cy="0" rx="60" ry="10" fill="#0c4a6e" stroke="url(#aiGrad)" stroke-width="2"/>
      <!-- AI Icon -->
      <g transform="translate(0, -20)">
        <rect x="-25" y="-20" width="50" height="40" rx="5" fill="#06b6d4" opacity="0.2"/>
        <text x="0" y="5" text-anchor="middle" fill="#06b6d4" font-size="16" font-weight="bold" font-family="system-ui">AI</text>
      </g>
      <!-- Items -->
      <g transform="translate(-30, 15)">
        <rect x="0" y="0" width="20" height="20" fill="#06b6d4" opacity="0.6" rx="2"/>
        <text x="10" y="14" text-anchor="middle" fill="#f8fafc" font-size="10">📊</text>
      </g>
      <g transform="translate(10, 15)">
        <rect x="0" y="0" width="20" height="20" fill="#3b82f6" opacity="0.6" rx="2"/>
        <text x="10" y="14" text-anchor="middle" fill="#f8fafc" font-size="10">💻</text>
      </g>
    </g>
    
    <!-- Right pan - Human Creativity -->
    <g transform="translate(200, 50)">
      <!-- Chain -->
      <line x1="0" y1="-55" x2="0" y2="0" stroke="#94a3b8" stroke-width="3"/>
      <!-- Pan -->
      <path d="M-60 0 Q-60 40 0 40 Q60 40 60 0" fill="none" stroke="url(#humanGrad)" stroke-width="3"/>
      <ellipse cx="0" cy="0" rx="60" ry="10" fill="#0c4a6e" stroke="url(#humanGrad)" stroke-width="2"/>
      <!-- Human Icon -->
      <g transform="translate(0, -20)">
        <circle cx="0" cy="-10" r="12" fill="#f59e0b" opacity="0.8"/>
        <path d="M-15 15 Q-15 0 0 0 Q15 0 15 15" fill="#f59e0b" opacity="0.6"/>
      </g>
      <!-- Items -->
      <g transform="translate(-30, 15)">
        <rect x="0" y="0" width="20" height="20" fill="#f59e0b" opacity="0.6" rx="2"/>
        <text x="10" y="14" text-anchor="middle" fill="#f8fafc" font-size="10">🎨</text>
      </g>
      <g transform="translate(10, 15)">
        <rect x="0" y="0" width="20" height="20" fill="#ef4444" opacity="0.6" rx="2"/>
        <text x="10" y="14" text-anchor="middle" fill="#f8fafc" font-size="10">💡</text>
      </g>
    </g>
  </g>
  
  <!-- Labels -->
  <g font-family="system-ui" font-size="14" font-weight="bold">
    <text x="200" y="480" text-anchor="middle" fill="#06b6d4">AI 擅长</text>
    <text x="600" y="480" text-anchor="middle" fill="#f59e0b">人类专长</text>
  </g>
  
  <!-- Capability lists -->
  <g font-family="system-ui" font-size="12">
    <!-- AI side -->
    <g transform="translate(120, 280)">
      <rect x="-80" y="-10" width="160" height="120" fill="#0c4a6e" opacity="0.5" rx="8" stroke="#06b6d4" stroke-width="1"/>
      <text x="0" y="15" text-anchor="middle" fill="#06b6d4" font-weight="bold">✓ 数据处理</text>
      <text x="0" y="40" text-anchor="middle" fill="#06b6d4" font-weight="bold">✓ 模式识别</text>
      <text x="0" y="65" text-anchor="middle" fill="#06b6d4" font-weight="bold">✓ 代码生成</text>
      <text x="0" y="90" text-anchor="middle" fill="#06b6d4" font-weight="bold">✓ 快速计算</text>
    </g>
    
    <!-- Human side -->
    <g transform="translate(680, 280)">
      <rect x="-80" y="-10" width="160" height="120" fill="#0c4a6e" opacity="0.5" rx="8" stroke="#f59e0b" stroke-width="1"/>
      <text x="0" y="15" text-anchor="middle" fill="#f59e0b" font-weight="bold">✓ 创意创新</text>
      <text x="0" y="40" text-anchor="middle" fill="#f59e0b" font-weight="bold">✓ 情感理解</text>
      <text x="0" y="65" text-anchor="middle" fill="#f59e0b" font-weight="bold">✓ 价值判断</text>
      <text x="0" y="90" text-anchor="middle" fill="#f59e0b" font-weight="bold">✓ 战略规划</text>
    </g>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="100" r="25" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <circle cx="720" cy="500" r="35" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <circle cx="750" cy="120" r="20" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
</svg>