<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad3)"/>

  <!-- Hexagon pattern -->
  <defs>
    <pattern id="hexagons" width="50" height="43.4" patternUnits="userSpaceOnUse" patternTransform="scale(0.5)">
      <path d="M25 0 L50 14.4 L50 38.6 L25 53 L0 38.6 L0 14.4 Z" fill="none" stroke="#4338ca" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#hexagons)"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="#f8fafc" font-size="28" font-family="system-ui" font-weight="bold">提示工程</text>
  <text x="400" y="90" text-anchor="middle" fill="#a5b4fc" font-size="14" font-family="system-ui">与 AI 有效沟通的艺术</text>

  <!-- Central AI Brain -->
  <g transform="translate(400, 280)">
    <!-- Brain shape -->
    <path d="M-60 -40 Q-80 -20 -70 10 Q-80 40 -50 50 Q-20 60 0 50 Q20 60 50 50 Q80 40 70 10 Q80 -20 60 -40 Q40 -60 0 -55 Q-40 -60 -60 -40" fill="#4338ca" stroke="#6366f1" stroke-width="2" filter="url(#glow3)"/>

    <!-- Neural connections inside brain -->
    <g stroke="#818cf8" stroke-width="1.5" opacity="0.6">
      <line x1="-30" y1="-20" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="30" y2="-20"/>
      <line x1="-20" y1="20" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="20" y2="20"/>
      <line x1="-40" y1="0" x2="-20" y2="0"/>
      <line x1="20" y1="0" x2="40" y2="0"/>
    </g>

    <!-- Nodes -->
    <circle cx="-30" cy="-20" r="4" fill="#a78bfa"/>
    <circle cx="30" cy="-20" r="4" fill="#a78bfa"/>
    <circle cx="-20" cy="20" r="4" fill="#a78bfa"/>
    <circle cx="20" cy="20" r="4" fill="#a78bfa"/>
    <circle cx="0" cy="0" r="6" fill="#f472b6" filter="url(#glow3)"/>
    <circle cx="-40" cy="0" r="3" fill="#818cf8"/>
    <circle cx="40" cy="0" r="3" fill="#818cf8"/>

    <!-- AI Label -->
    <text x="0" y="85" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="bold" font-family="system-ui">AI 模型</text>
  </g>

  <!-- Input prompt -->
  <g transform="translate(150, 280)">
    <rect x="-100" y="-60" width="200" height="120" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="2" rx="10" filter="url(#glow3)"/>
    <text x="0" y="-35" text-anchor="middle" fill="#a78bfa" font-size="12" font-family="system-ui">输入提示词</text>

    <!-- Prompt text lines -->
    <g transform="translate(-80, -15)">
      <rect x="0" y="0" width="160" height="8" fill="#8b5cf6" opacity="0.3" rx="2"/>
      <rect x="0" y="15" width="120" height="8" fill="#8b5cf6" opacity="0.3" rx="2"/>
      <rect x="0" y="30" width="140" height="8" fill="#8b5cf6" opacity="0.3" rx="2"/>
      <rect x="0" y="45" width="100" height="8" fill="#8b5cf6" opacity="0.3" rx="2"/>
    </g>

    <!-- Person icon -->
    <g transform="translate(0, -95)">
      <circle cx="0" cy="0" r="20" fill="#ec4899" opacity="0.2"/>
      <circle cx="0" cy="-5" r="8" fill="#f472b6"/>
      <path d="M-12 15 Q-12 5 0 5 Q12 5 12 15" fill="#f472b6"/>
    </g>
  </g>

  <!-- Output response -->
  <g transform="translate(650, 280)">
    <rect x="-100" y="-60" width="200" height="120" fill="#1e1b4b" stroke="#10b981" stroke-width="2" rx="10" filter="url(#glow3)"/>
    <text x="0" y="-35" text-anchor="middle" fill="#34d399" font-size="12" font-family="system-ui">AI 响应</text>

    <!-- Response text lines -->
    <g transform="translate(-80, -15)">
      <rect x="0" y="0" width="160" height="8" fill="#10b981" opacity="0.3" rx="2"/>
      <rect x="0" y="15" width="140" height="8" fill="#10b981" opacity="0.3" rx="2"/>
      <rect x="0" y="30" width="150" height="8" fill="#10b981" opacity="0.3" rx="2"/>
      <rect x="0" y="45" width="130" height="8" fill="#10b981" opacity="0.3" rx="2"/>
    </g>

    <!-- Checkmark -->
    <g transform="translate(0, -95)">
      <circle cx="0" cy="0" r="20" fill="#10b981" opacity="0.2"/>
      <path d="M-8 0 L-2 6 L8 -6" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Connection arrows -->
  <g>
    <!-- Input to AI arrow -->
    <line x1="250" y1="280" x2="320" y2="280" stroke="url(#promptGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- AI to Output arrow -->
    <line x1="480" y1="280" x2="550" y2="280" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead2)"/>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="url(#promptGrad)"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Prompt engineering tips -->
  <g transform="translate(400, 480)">
    <text x="0" y="0" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold" font-family="system-ui">提示工程原则</text>

    <g transform="translate(-300, 25)">
      <rect x="0" y="0" width="140" height="60" fill="#312e81" stroke="#8b5cf6" stroke-width="1" rx="8" opacity="0.8"/>
      <text x="70" y="25" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">1. 明确具体</text>
      <text x="70" y="45" text-anchor="middle" fill="#c4b5fd" font-size="10">清晰的指令</text>
    </g>

    <g transform="translate(-150, 25)">
      <rect x="0" y="0" width="140" height="60" fill="#312e81" stroke="#ec4899" stroke-width="1" rx="8" opacity="0.8"/>
      <text x="70" y="25" text-anchor="middle" fill="#f472b6" font-size="11" font-weight="bold">2. 提供上下文</text>
      <text x="70" y="45" text-anchor="middle" fill="#fbcfe8" font-size="10">背景信息</text>
    </g>

    <g transform="translate(10, 25)">
      <rect x="0" y="0" width="140" height="60" fill="#312e81" stroke="#06b6d4" stroke-width="1" rx="8" opacity="0.8"/>
      <text x="70" y="25" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold">3. 指定格式</text>
      <text x="70" y="45" text-anchor="middle" fill="#a5f3fc" font-size="10">输出结构</text>
    </g>

    <g transform="translate(160, 25)">
      <rect x="0" y="0" width="140" height="60" fill="#312e81" stroke="#10b981" stroke-width="1" rx="8" opacity="0.8"/>
      <text x="70" y="25" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">4. 迭代优化</text>
      <text x="70" y="45" text-anchor="middle" fill="#a7f3d0" font-size="10">持续改进</text>
    </g>
  </g>

  <!-- Decorative elements -->
  <circle cx="80" cy="100" r="30" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <circle cx="720" cy="500" r="40" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="520" r="25" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
</svg>