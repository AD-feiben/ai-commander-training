<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#f8fafc" font-size="28" font-family="system-ui" font-weight="bold">规范模板库</text>
  <text x="400" y="80" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui">四大场景模板，即拿即用</text>

  <!-- Template Cards -->
  
  <!-- API Template -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="350" height="200" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="12" filter="url(#glow)"/>
    <text x="175" y="35" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="bold" font-family="system-ui">API 接口规范</text>
    
    <g transform="translate(20, 60)">
      <text x="0" y="0" fill="#cbd5e1" font-size="12" font-family="system-ui">• 请求/响应定义</text>
      <text x="0" y="25" fill="#cbd5e1" font-size="12" font-family="system-ui">• 参数说明</text>
      <text x="0" y="50" fill="#cbd5e1" font-size="12" font-family="system-ui">• 错误处理</text>
      <text x="0" y="75" fill="#cbd5e1" font-size="12" font-family="system-ui">• 性能要求</text>
    </g>
    
    <text x="175" y="175" text-anchor="middle" fill="#64748b" font-size="11" font-family="system-ui">RESTful / GraphQL / RPC</text>
  </g>

  <!-- Function Template -->
  <g transform="translate(400, 120)">
    <rect x="0" y="0" width="350" height="200" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="12" filter="url(#glow)"/>
    <text x="175" y="35" text-anchor="middle" fill="#34d399" font-size="16" font-weight="bold" font-family="system-ui">函数/方法规范</text>
    
    <g transform="translate(20, 60)">
      <text x="0" y="0" fill="#cbd5e1" font-size="12" font-family="system-ui">• 函数签名</text>
      <text x="0" y="25" fill="#cbd5e1" font-size="12" font-family="system-ui">• 参数说明</text>
      <text x="0" y="50" fill="#cbd5e1" font-size="12" font-family="system-ui">• 返回值</text>
      <text x="0" y="75" fill="#cbd5e1" font-size="12" font-family="system-ui">• 复杂度分析</text>
    </g>
    
    <text x="175" y="175" text-anchor="middle" fill="#64748b" font-size="11" font-family="system-ui">工具函数 / 算法实现</text>
  </g>

  <!-- Project Template -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="350" height="200" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="12" filter="url(#glow)"/>
    <text x="175" y="35" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="bold" font-family="system-ui">项目/模块规范</text>
    
    <g transform="translate(20, 60)">
      <text x="0" y="0" fill="#cbd5e1" font-size="12" font-family="system-ui">• 项目概述</text>
      <text x="0" y="25" fill="#cbd5e1" font-size="12" font-family="system-ui">• 功能需求</text>
      <text x="0" y="50" fill="#cbd5e1" font-size="12" font-family="system-ui">• 技术方案</text>
      <text x="0" y="75" fill="#cbd5e1" font-size="12" font-family="system-ui">• 项目计划</text>
    </g>
    
    <text x="175" y="175" text-anchor="middle" fill="#64748b" font-size="11" font-family="system-ui">项目启动 / 模块开发</text>
  </g>

  <!-- Component Template -->
  <g transform="translate(400, 340)">
    <rect x="0" y="0" width="350" height="200" fill="#1e293b" stroke="#ec4899" stroke-width="2" rx="12" filter="url(#glow)"/>
    <text x="175" y="35" text-anchor="middle" fill="#f472b6" font-size="16" font-weight="bold" font-family="system-ui">UI/组件规范</text>
    
    <g transform="translate(20, 60)">
      <text x="0" y="0" fill="#cbd5e1" font-size="12" font-family="system-ui">• Props 定义</text>
      <text x="0" y="25" fill="#cbd5e1" font-size="12" font-family="system-ui">• 事件/回调</text>
      <text x="0" y="50" fill="#cbd5e1" font-size="12" font-family="system-ui">• 样式规范</text>
      <text x="0" y="75" fill="#cbd5e1" font-size="12" font-family="system-ui">• 使用示例</text>
    </g>
    
    <text x="175" y="175" text-anchor="middle" fill="#64748b" font-size="11" font-family="system-ui">前端组件 / 页面设计</text>
  </g>

  <!-- Bottom tip -->
  <text x="400" y="580" text-anchor="middle" fill="#64748b" font-size="12" font-family="system-ui">模板是经验的沉淀，根据场景选择，灵活调整使用</text>

  <!-- Decorative elements -->
  <circle cx="40" cy="100" r="20" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <circle cx="760" cy="550" r="25" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.3"/>
  <circle cx="90" cy="580" r="15" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>
</svg>